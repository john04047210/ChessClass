# /etc/nginx/conf.d/chess9527.conf
#
# Expected certificate:
#   /etc/letsencrypt/live/chess9527.com/fullchain.pem
#   /etc/letsencrypt/live/chess9527.com/privkey.pem
# The certificate should cover:
#   chess9527.com, www.chess9527.com, chess9527.online, www.chess9527.online

log_format chess_access '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" country="$http_cf_ipcountry" '
                        'request_time=$request_time';

# HTTP is only used for HTTPS redirects and ACME renewal challenges.
server {
    listen 80;
    listen [::]:80;
    server_name chess9527.com www.chess9527.com chess9527.online www.chess9527.online;

    location ^~ /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        default_type text/plain;
    }

    location / {
        return 301 https://chess9527.com$request_uri;
    }
}

# Secondary domains always use the canonical .com address.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.chess9527.com chess9527.online www.chess9527.online;

    ssl_certificate /etc/letsencrypt/live/chess9527.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chess9527.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:ChessSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    return 301 https://chess9527.com$request_uri;
}

# Canonical production site.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chess9527.com;

    root /usr/share/nginx/html/chessclass;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/chess9527.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chess9527.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:ChessSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    access_log /var/log/nginx/chess9527.access.log chess_access;
    error_log /var/log/nginx/chess9527.error.log warn;

    charset utf-8;
    autoindex off;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;

    # Next.js content-hashed assets can be cached permanently.
    location ^~ /_next/static/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
    }

    # Stockfish filenames are versioned by the project deployment.
    location ^~ /stockfish/ {
        try_files $uri =404;
        types {
            application/wasm wasm;
            application/javascript js;
            text/plain txt;
        }
        expires 7d;
    }

    # HTML must revalidate so a deployment is visible without a hard refresh.
    location ~* \.html$ {
        try_files $uri =404;
        expires -1;
    }

    # Next.js static export uses directories such as /zh-CN/index.html.
    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\. {
        deny all;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
