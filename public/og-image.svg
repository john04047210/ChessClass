    <rect x="194" width="178" height="58" rx="29" fill="#fff" stroke="#c9d8ce"/>
    <text x="283" y="38" text-anchor="middle" fill="#285d49" font-size="22" font-weight="700" font-family="Arial, sans-serif">Practice</text>
    <rect x="388" width="178" height="58" rx="29" fill="#1f684d"/>
    <text x="477" y="38" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="Arial, sans-serif">Challenge</text>
  </g>
